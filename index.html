
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedCore SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Quill Snow Theme -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              petrol: {
                dark: '#2E446B',
                medium: '#3F6FA1',
                vibrant: '#2C5F9E',
                soft: '#8FB3C9',
                ui: '#D9E1E6',
                neutral: '#F2F4F6',
              },
              brand: {
                primary: '#2C5F9E',
                secondary: '#3F6FA1',
                surface: '#F2F4F6',
                accent: '#2E446B',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              outfit: ['Outfit', 'sans-serif'],
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'pulse-soft': 'pulse-soft 4s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              'pulse-soft': {
                '0%, 100%': { opacity: 0.4, transform: 'scale(1)' },
                '50%': { opacity: 0.6, transform: 'scale(1.05)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #F2F4F6;
        color: #2E446B;
        overflow-x: hidden;
      }
      h1, h2, h3, h4, .font-outfit {
        font-family: 'Outfit', sans-serif;
      }
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(46, 68, 107, 0.08);
      }
      .glass-dark {
        background: rgba(46, 68, 107, 0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(46, 68, 107, 0.1);
      }
      .premium-gradient {
        background: radial-gradient(circle at top right, #F2F4F6 0%, #D9E1E6 100%);
      }
      .text-balance {
        text-wrap: balance;
      }
      
      /* Custom Scrollbar Utilities */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(46, 68, 107, 0.1);
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(46, 68, 107, 0.2);
      }

      /* Global Default Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #F2F4F6;
      }
      ::-webkit-scrollbar-thumb {
        background: #8FB3C9;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3F6FA1;
      }

      /* Specialty Themes */
      .specialty-theme-cardiology .bg-blue-600 { background-color: #10b981 !important; }
      .specialty-theme-cardiology .text-blue-400 { color: #059669 !important; }
      
      .specialty-theme-dermatology .bg-blue-600 { background-color: #2C5F9E !important; }
      .specialty-theme-dermatology .text-blue-400 { color: #3F6FA1 !important; }
      
      .specialty-theme-psychology .bg-blue-600 { background-color: #6366f1 !important; }
      .specialty-theme-psychology .text-blue-400 { color: #4f46e5 !important; }

      /* Light Mode Quill Overrides */
      .ql-toolbar.ql-snow {
        border-color: rgba(46, 68, 107, 0.1) !important;
        background: rgba(255, 255, 255, 0.8);
        border-radius: 1rem 1rem 0 0;
      }
      .ql-container.ql-snow {
        border-color: rgba(46, 68, 107, 0.1) !important;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 0 0 1rem 1rem;
        color: #2E446B;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-quill": "https://esm.sh/react-quill@^2.0.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
